<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>KIZUNA Atelier — 名刺印刷用</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        @page {
            size: 91mm 55mm;
            margin: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .card {
            width: 91mm;
            height: 55mm;
            background: #FFFDF8;
            position: relative;
            overflow: hidden;
            page-break-after: always;
        }

        /* === FRONT === */
        .card--front {
            display: flex;
            padding: 6mm 6.5mm 4.5mm;
            flex-direction: column;
            justify-content: space-between;
        }

        .card--front::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 0.5mm;
            background: linear-gradient(90deg, #FF7F7F, #FFB347, #98D8C8);
        }

        .front-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .front-brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.8mm;
            letter-spacing: 0.5mm;
            color: #2d2d2d;
        }

        .front-brand span {
            color: #E8836B;
        }

        .front-tagline {
            font-size: 1.5mm;
            color: #aaa;
            letter-spacing: 0.15mm;
        }

        .front-main {
            margin-top: 2mm;
        }

        .front-name-jp {
            font-size: 5.3mm;
            font-weight: 700;
            color: #2d2d2d;
            letter-spacing: 1.3mm;
            line-height: 1.3;
        }

        .front-name-en {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8mm;
            font-weight: 300;
            color: #999;
            letter-spacing: 0.5mm;
            margin-top: 0.7mm;
        }

        .front-title {
            font-size: 1.8mm;
            font-weight: 400;
            color: #777;
            margin-top: 1.7mm;
            letter-spacing: 0.15mm;
        }

        .front-contact {
            display: flex;
            flex-wrap: wrap;
            gap: 1mm 3.3mm;
            font-size: 1.6mm;
            color: #888;
            letter-spacing: 0.08mm;
        }

        .front-contact span {
            display: flex;
            align-items: center;
            gap: 0.8mm;
        }

        .front-contact .label {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.3mm;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 0.15mm;
            min-width: 4.5mm;
        }

        /* === BACK === */
        .card--back {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .card--back::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 0.5mm;
            background: linear-gradient(90deg, #FF7F7F, #FFB347, #98D8C8);
        }

        .back-logo {
            width: 13mm;
            height: 13mm;
            object-fit: contain;
            margin-bottom: 2.5mm;
            position: relative;
            z-index: 1;
        }

        .back-brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 4.6mm;
            color: #2d2d2d;
            letter-spacing: 0.7mm;
            position: relative;
            z-index: 1;
        }

        .back-brand span {
            font-weight: 300;
            color: #E8836B;
        }

        .back-tagline {
            font-size: 2mm;
            font-weight: 300;
            color: #999;
            margin-top: 2mm;
            letter-spacing: 0.5mm;
            position: relative;
            z-index: 1;
        }

        .back-url {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5mm;
            font-weight: 300;
            color: #ccc;
            margin-top: 3.3mm;
            letter-spacing: 0.3mm;
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>

    <!-- Page 1: Front -->
    <div class="card card--front">
        <div class="front-top">
            <div>
                <div class="front-brand"><span>KIZUNA</span> Atelier</div>
            </div>
            <div class="front-tagline">つくる力は、生きる力。</div>
        </div>
        <div class="front-main">
            <div class="front-name-jp">大貫 千穂</div>
            <div class="front-name-en">Chiho Onuki</div>
            <div class="front-title">彫刻家 / アート教育プロデューサー</div>
        </div>
        <div class="front-contact">
            <span><span class="label">Tel</span> 080-3006-7195</span>
            <span><span class="label">Mail</span> chihonuki413@gmail.com</span>
            <span><span class="label">Web</span> kizunaatelier.art</span>
        </div>
    </div>

    <!-- Page 2: Back -->
    <div class="card card--back">
        <img src="apple-touch-icon.png" alt="KIZUNA Atelier" class="back-logo">
        <div class="back-brand">KIZUNA <span>Atelier</span></div>
        <div class="back-tagline">つくる力は、生きる力。</div>
        <div class="back-url">kizunaatelier.art</div>
    </div>

</body>

</html>
